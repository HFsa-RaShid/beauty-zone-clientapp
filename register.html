<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway:400,700&display=swap" />
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/toast.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
    <title>Create Account - Seoul Mirage</title>
</head>
<body>
    <div class="container">
        <div id="register-section">
            <h1>Create your account</h1>
            <div class="toggle-text">Or <a href="login.html">sign in to your existing account</a></div>
            
            <div class="auth-card">
                <form id="registerForm">
                    <div class="form-group">
                        <label>Full name</label>
                        <input type="text" id="regName" required>
                    </div>
                    <div class="form-group">
                        <label>Email address</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="regPass" required>
                            <span class="eye-icon">
                              <i class="fa-solid fa-eye"></i>
                            </span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPass" required>
                            <span class="eye-icon">
                              <i class="fa-solid fa-eye"></i>
                            </span>
                        </div>
                    </div>
                    <div class="options-row">
                        <label><input type="checkbox" required> I agree to the <b>Terms of Service</b> and <b>Privacy Policy</b></label>
                    </div>
                    <button type="submit" class="btn-black">Create Account</button>
                </form>
            </div>
            <p class="toggle-text" style="margin-top: 20px;">Already have an account? <a href="login.html">Sign in</a></p>
        </div>
        <div id="messageBox" class="message-box"></div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
